name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tauri desktop builds ─────────────────────────────────────────────────────
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''

          - platform: macos-latest
            rust-targets: ''
            tauri-args: ''

          - platform: macos-latest
            rust-targets: 'x86_64-apple-darwin'
            tauri-args: '--target x86_64-apple-darwin'

          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: tauri-app/pnpm-lock.yaml

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'
          cache-on-failure: true

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libavahi-compat-libdnssd-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: pnpm install

      - name: Build frontend
        working-directory: tauri-app
        run: pnpm run build

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'rust-air ${{ github.ref_name }}'
          releaseBody: |
            ## rust-air ${{ github.ref_name }} — LAN 极速文件传输工具

            一款专注于局域网高速文件传输的开源工具，支持 Windows、macOS、Linux 全平台。

            ### ✨ 核心特性

            - **🚀 极速传输** - 单文件传输速度可达 280+ MB/s，千兆网络满速运行
            - **📁 智能归档** - 小文件自动并行压缩，1000+ 小文件传输效率提升 10 倍
            - **🔄 断点续传** - 网络中断自动重连，传输进度不丢失
            - **🔒 端到端加密** - ChaCha20-Poly1305 加密 + SHA-256 校验，安全无忧
            - **📡 自动发现** - mDNS 局域网设备自动发现，无需手动输入 IP
            - **📋 剪贴板同步** - 跨设备文本、图片剪贴板共享
            - **📝 待办清单** - 内置待办事项与日历视图

            ### 📦 下载安装包

            | 操作系统 | 文件 | 说明 |
            |---------|------|------|
            | **Windows** | `.msi` | 推荐安装包，带安装向导 |
            | **Windows** | `.exe` | 免安装便携版 |
            | **macOS (M1/M2/M3)** | `_aarch64.dmg` | Apple Silicon 芯片 |
            | **macOS (Intel)** | `_x64.dmg` | Intel 芯片 |
            | **Linux** | `.deb` | Debian/Ubuntu |
            | **Linux** | `.AppImage` | 免安装，所有发行版通用 |
            | **CLI** | `rust-air-cli-*` | 命令行版本 |

            ### 📝 更新日志

            **v0.3.42**
            - 新增并行归档生成，小文件传输性能大幅提升
            - 修复断点续传重连问题
            - 优化传输流水线，提升大文件传输速度

            ### 🔗 相关链接

            - 项目主页: https://github.com/1716775457damn/rust-air
            - 问题反馈: https://github.com/1716775457damn/rust-air/issues
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}

  # ── CLI binaries ─────────────────────────────────────────────────────────────
  build-cli:
    needs: build-tauri
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rust-air.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rust-air
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: rust-air
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: rust-air

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavahi-compat-libdnssd-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build CLI
        run: cargo build -p rust-air-cli --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          EXT="${{ matrix.binary == 'rust-air.exe' && '.exe' || '' }}"
          DST="rust-air-cli-${{ matrix.target }}${EXT}"
          cp "$SRC" "$DST"
          echo "BINARY_PATH=$DST" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.BINARY_PATH }}
