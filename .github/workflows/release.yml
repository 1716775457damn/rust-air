name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Opt into Node.js 24 now to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tauri desktop builds ─────────────────────────────────────────────────────
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''

          - platform: macos-latest
            rust-targets: ''
            tauri-args: ''

          - platform: macos-latest
            rust-targets: 'x86_64-apple-darwin'
            tauri-args: '--target x86_64-apple-darwin'

          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tauri-app/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'
          cache-on-failure: true

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libavahi-compat-libdnssd-dev

      # Install deps manually so tauri-action finds the CLI
      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      # Build frontend separately to catch errors early and skip vue-tsc in CI
      - name: Build frontend
        working-directory: tauri-app
        run: npx vite build

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: tauri-app
          tagName: ${{ github.ref_name }}
          releaseName: 'rust-air ${{ github.ref_name }}'
          releaseBody: |
            ## rust-air ${{ github.ref_name }} — LAN 极速文件传输

            ### 📦 下载安装包

            | 操作系统 | 文件 | 说明 |
            |---------|------|------|
            | Windows | `.msi` | 推荐，带安装向导 |
            | Windows | `.exe` | 免安装便携版 |
            | macOS (M系列) | `.dmg` | Apple Silicon |
            | macOS (Intel) | `.dmg` | x86_64 |
            | Linux | `.deb` | Debian/Ubuntu |
            | Linux | `.AppImage` | 免安装，所有发行版通用 |

            ### 🔒 安全特性
            - E2EE：ChaCha20-Poly1305 端到端加密
            - SHA-256 文件完整性校验
            - mDNS-SD 局域网自动发现，无需手动输入 IP
          releaseDraft: false
          prerelease: false
          # Tell tauri-action the frontend is already built
          distPath: '../dist'
          args: ${{ matrix.tauri-args }}

  # ── CLI binaries ─────────────────────────────────────────────────────────────
  build-cli:
    needs: build-tauri
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rust-air.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rust-air
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: rust-air

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-compat-libdnssd-dev

      - name: Build CLI
        run: cargo build -p rust-air-cli --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          EXT="${{ matrix.binary == 'rust-air.exe' && '.exe' || '' }}"
          DST="rust-air-cli-${{ matrix.target }}${EXT}"
          cp "$SRC" "$DST"
          echo "BINARY_PATH=$DST" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.BINARY_PATH }}
